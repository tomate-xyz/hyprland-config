# #######################################################################################
# XDPH (X Desktop Portal - Hyprland)
# #######################################################################################

screencopy {
  # Allow screenshare picker token by default (simplifies screen sharing)
  allow_token_by_default = true
  # Use custom screenshare picker (hyprland-preview-share-picker)
  # This provides a preview of what will be shared
  custom_picker_binary = hyprland-preview-share-picker
}
