# #######################################################################################
# ENVIRONMENT VARIABLES
# #######################################################################################

# ########################################
# Wayland compatibility
# ########################################

# GTK apps (GNOME apps, file managers, ...)
env = GDK_BACKEND,wayland,x11,*
# Qt apps (KDE apps, Qt-based apps)
env = QT_QPA_PLATFORM,wayland;xcb
# SDL apps (games, emulators)
env = SDL_VIDEODRIVER,wayland
# Firefox
env = MOZ_ENABLE_WAYLAND,1
# Electron apps (Discord, VS Code, ...)
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
# Chromium-based apps
env = OZONE_PLATFORM,wayland
# Session type hint
env = XDG_SESSION_TYPE,wayland

# Screenshare compatibility
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# Force zero scaling for X11 apps running in Wayland
xwayland {
  force_zero_scaling = true
}

# ########################################
# Style
# ########################################

# Compose key for special characters
env = XCOMPOSEFILE,~/.XCompose
# Qt theming
env = QT_QPA_PLATFORMTHEME, qt6ct
# Disable Qt window decorations (use Hyprland's instead)
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = GDK_SCALE,1
env = QT_SCALE_FACTOR,1
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# env = QT_STYLE_OVERRIDE,kvantum

# ########################################
# Misc
# ########################################

# Disable news/update notifications in apps
ecosystem {
  no_update_news = true
}
