# #######################################################################################
# MONITORS
# #######################################################################################

# ########################################
# Screens
# ########################################

# Right monitor (primary screen)
# DP-1: 1920x1080 144Hz, positioned @x=1920 (to the right)
monitor = DP-1, 1920x1080@144, 1920x0, 1

# Left monitor (second screen)
# DP-2: 1920x1080 60Hz, positioned @x=0 (leftmost)
monitor = DP-2, 1920x1080@60, 0x0, 1

# ########################################
# Custom workspace setup
# ########################################

# Monitor DP-1: Workspaces 1-4 (primary monitor, right side)
workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1

# Monitor DP-2: Workspaces 5-8 (secondary monitor, left side)
workspace = 6, monitor:DP-2
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2
workspace = 10, monitor:DP-2
