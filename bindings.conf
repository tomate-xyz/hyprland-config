# #######################################################################################
# BINDINGS
# #######################################################################################

# ########################################
# Defaults
# ########################################

$mainMod = SUPER

$terminal = kitty
$browser = zen-browser
$fileManager = nautilus
$menu = qs -c noctalia-shell ipc call launcher toggle

# ########################################
# System
# ########################################

bindd = $mainMod, Space, App Launcher, exec, $menu
bindd = $mainMod, A, Control center, exec, qs -c noctalia-shell ipc call controlCenter toggle
bindd = $mainMod, Escape, Power options, exec, qs -c noctalia-shell ipc call sessionMenu toggle
bindd = $mainMod, period, Emoji Picker, exec, qs -c noctalia-shell ipc call launcher emoji
bindd = $mainMod, comma, Translator, exec, qs -c noctalia-shell ipc call plugin:translator toggle "en" ""

bindd = $mainMod, TAB, Toggle workspace overview, exec, qs -c noctalia-shell ipc call plugin:workspace-overview toggle

# ########################################
# Apps
# ########################################

bindd = $mainMod, E, File Manager, exec, uwsm app -- $fileManager --new-window
bindd = $mainMod, Return, Terminal, exec, $terminal
bindd = $mainMod CTRL, V, Clipboard Manager, exec, $terminal --class clipse -e "clipse"
bindd = $mainMod, W, Browser, exec, $browser
bindd = $mainMod, M, Music, exec, spotify
bindd = $mainMod, N, Editor, exec, zeditor
bindd = $mainMod SHIFT, T, Task Manager, exec, txyz-floating-terminal btop
bindd = $mainMod, G, Soundboard, exec, GDK_BACKEND=x11 WEBKIT_DISABLE_DMABUF_RENDERER=1 soundux

# ########################################
# Windows & Workspaces
# ########################################

bind = $mainMod, 1, split-workspace, 1
bind = $mainMod, 2, split-workspace, 2
bind = $mainMod, 3, split-workspace, 3
bind = $mainMod, 4, split-workspace, 4

bind = $mainMod SHIFT, 1, split-movetoworkspacesilent, 1; split-workspace, 1
bind = $mainMod SHIFT, 2, split-movetoworkspacesilent, 2; split-workspace, 2
bind = $mainMod SHIFT, 3, split-movetoworkspacesilent, 3; split-workspace, 3
bind = $mainMod SHIFT, 4, split-movetoworkspacesilent, 4; split-workspace, 4
bind = $mainMod SHIFT, 5, split-movetoworkspacesilent, 5; split-workspace, 5

binddm = $mainMod, mouse:272, Move window, movewindow
binddm = $mainMod, mouse:273, Resize window, resizewindow

bindd = $mainMod, Q, Kill active window, killactive
bindd = $mainMod, T, Float window, togglefloating
bindd = $mainMod, P, Pseudo tile, pseudo, # dwindle
bindd = $mainMod, J, Split window, togglesplit, # dwindle

bindd = ALT, TAB, Cycle to next window, cyclenext
bindd = ALT SHIFT, TAB, Cycle to prev window, cyclenext, prev
bindd = ALT, TAB, Reveal active window on top, bringactivetotop
bindd = ALT SHIFT, TAB, Reveal active window on top, bringactivetotop

bindd = $mainMod, left, Move focus left, movefocus, l
bindd = $mainMod, right, Move focus right, movefocus, r
bindd = $mainMod, up, Move focus up, movefocus, u
bindd = $mainMod, down, Move focus down, movefocus, d

bindd = $mainMod, mouse_down, Next workspace, workspace, e+1
bindd = $mainMod, mouse_up, Previous workspace, workspace, e-1

bindd = $mainMod CTRL, S, Toggle scratchpad, togglespecialworkspace, magic
bindd = $mainMod SHIFT, S, Move to scratchpad, movetoworkspace, special:magic

# ########################################
# Multimedia
# ########################################

bindd = $mainMod, F, Fullscreen, fullscreen, 0
bindd = $mainMod SHIFT, D, Toggle Screens, exec, hyprctl dispatch dpms toggle

bindd = $mainMod, C, Universal copy, sendshortcut, CTRL, Insert,
bindd = $mainMod, V, Universal paste, sendshortcut, SHIFT, Insert,

bindde = $mainMod, plus, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 0.5')
bindde = $mainMod, minus, Zoom out, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float - 0.5) | if . < 1 then 1 else . end')

binddel = ,XF86AudioRaiseVolume, Increase output volume, exec, qs -c noctalia-shell ipc call volume increase
binddel = ,XF86AudioLowerVolume, Decrease output volume, exec, qs -c noctalia-shell ipc call volume decrease
binddel = ,XF86AudioMute, Toggle mute output volume, exec, qs -c noctalia-shell ipc call volume muteOutput
binddel = ,XF86AudioMicMute, Mute microphone, exec, qs -c noctalia-shell ipc call volume muteInput

binddl = , XF86AudioNext, Next source, exec, qs -c noctalia-shell ipc call media next
binddl = , XF86AudioPrev, Previous source, exec, qs -c noctalia-shell ipc call media previous
binddl = , XF86AudioPause, Toggle pause source, exec, qs -c noctalia-shell ipc call media playPause
binddl = , XF86AudioPlay, Toggle pause source, exec, qs -c noctalia-shell ipc call media playPause

bindd = , PRINT, Screenshot, exec, ~/.local/bin/screenshot
bindd = SHIFT, PRINT, Screenshot with editing, exec, ~/.local/bin/screenshot-edit

bindd = $mainMod, XF86Launch5, Colorpicker, exec, pkill hyprpicker || hyprpicker -a

# ########################################
# Global shortcuts & passes
# ########################################

# Custom autoclicker pass
bindd = , F6, Autoclicker pass, pass, class:^(com.txyz.mach)$

# Discord mute hotkey pass
bindd = , XF86Launch8, Discord mute pass, pass, class:^(discord)$
bindd = , XF86Launch8, Discord mute shortcut, sendshortcut, CTRL_SHIFT, M, class:^(vesktop|equibop)$
